modLoader="javafml"

loaderVersion="${loader_version_range}"

license="${mod_license}"


[[mods]]

modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
authors="${mod_authors}"
description='''${mod_description}'''

[[mixins]]
    config="${mod_id}.mixins.json"

[[dependencies.${mod_id}]]
    modId="neoforge"
    type="required"
    versionRange="[${neo_version},)"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="minecraft"
    type="required"
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId = "blueprint"
    type = "required"
    versionRange = "[${blueprint_version},)"
    ordering = "AFTER"
    side = "BOTH"

[[dependencies.${mod_id}]]
    modId = "farmersdelight"
    type = "optional"
    versionRange = "[${farmersdelight_version},)"
    ordering = "AFTER"
    side = "BOTH"

[[dependencies.${mod_id}]]
    modId = "clayworks"
    type = "optional"
    versionRange = "[${clayworks_version},)"
    ordering = "AFTER"
    side = "BOTH"

[[dependencies.${mod_id}]]
    modId = "woodworks"
    type = "optional"
    versionRange = "[${woodworks_version},)"
    ordering = "AFTER"
    side = "BOTH"

[[dependencies.${mod_id}]]
    modId = "gallery"
    type = "optional"
    versionRange = "[${gallery_version},)"
    ordering = "AFTER"
    side = "BOTH"